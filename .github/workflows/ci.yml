name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgtest-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --target unit_tests

      - name: Run unit tests
        run: cd build && ctest --verbose --output-on-failure